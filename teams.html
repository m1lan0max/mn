<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams — MNSSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="loading-logo">M</div>
    <div class="spinner spinner-blue"></div>
  </div>
</div>

<main class="page-content page-fade">
  <section class="section-pad" style="position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(30,58,138,0.1),transparent);"></div>
    <div class="container" style="position:relative;">
      <div class="text-center" style="margin-bottom:4rem;">
        <span class="section-label blue" style="animation:fadeIn .7s ease both;">Committees</span>
        <h1 style="margin-top:1rem;font-size:clamp(2rem,6vw,3.75rem);font-weight:900;color:white;animation:slideUp .7s ease .1s both;">
          MNSSA <span class="gradient-text">Teams</span>
        </h1>
        <p style="margin:.75rem auto 0;max-width:32rem;color:rgba(255,255,255,.5);animation:fadeIn .7s ease .2s both;">
          Discover the standing committees and teams that power MNSSA's projects and initiatives.
        </p>
      </div>
      <div class="grid-3" id="teams-grid"></div>
      <div id="teams-empty" class="empty-state hidden">
        <p>No teams found. Add teams via Supabase.</p>
      </div>
    </div>
  </section>
</main>

<script src="app.js"></script>
<script type="module" src="supabaseClient.js"></script>
<script type="module" src="teams.js"></script>
</body>
</html>
