<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team — MNSSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="loading-logo">M</div>
    <div class="spinner spinner-purple"></div>
  </div>
</div>

<main class="page-content page-fade">
  <section class="section-pad page-hero">
    <div class="container narrow text-center">
      <p class="badge" id="team-code"></p>
      <h1 id="team-name">Loading team…</h1>
      <p id="team-description">
        Please wait while we load the latest information for this team.
      </p>
    </div>
  </section>

  <section class="section-pad">
    <div class="container">
      <div class="text-center animate-on-scroll" style="margin-bottom:2rem;">
        <span class="section-label purple">People</span>
        <h2 class="section-title">Members</h2>
      </div>
      <div class="leaders-grid" id="leaders-grid"></div>
      <div class="card-grid" id="members-grid"></div>
      <div id="members-empty" class="empty-state hidden">
        <p>No members found for this team.</p>
      </div>
    </div>
  </section>

  <section class="section-pad" style="border-top:1px solid rgba(255,255,255,0.05);">
    <div class="container">
      <div class="text-center animate-on-scroll" style="margin-bottom:2rem;">
        <span class="section-label blue">Events</span>
        <h2 class="section-title">Upcoming &amp; Past</h2>
      </div>
      <div class="card-grid" id="events-grid"></div>
      <div id="events-empty" class="empty-state hidden">
        <p>No events found for this team.</p>
      </div>
    </div>
  </section>

  <section class="section-pad" style="border-top:1px solid rgba(255,255,255,0.05);">
    <div class="container">
      <div class="text-center animate-on-scroll" style="margin-bottom:2rem;">
        <span class="section-label purple">Forms</span>
        <h2 class="section-title">Submit a Response</h2>
      </div>
      <div id="forms-wrap" class="forms-wrap"></div>
      <div id="forms-empty" class="empty-state hidden">
        <p>No forms published for this team yet.</p>
      </div>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
<script type="module" src="js/supabaseClient.js"></script>
<script type="module" src="js/team.js"></script>
</body>
</html>
